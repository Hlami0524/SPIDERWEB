<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpiderWeb News SA</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
    }

    body {
      background: #0a0f1a;
      color: #e5e7eb;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #38bdf8;
    }

    header h1 {
      color: #38bdf8;
    }

   .search-box {
      display: flex;
      gap: 10px;
      padding: 12px;
      width: 100%;
      max-width: 100%;
      margin: 0;
    }

    input, select {
      flex: 1;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #1e293b;
      color: #fff;
      border-radius: 8px;
    }

    button {
      padding: 12px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    nav {
      background: #020617;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }

    nav a {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
    }

    nav a.active {
      background: #38bdf8;
      color: #000;
      border-radius: 6px;
    }

   .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

   .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

   .article-card {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

   .article-card:hover {
      transform: scale(1.03);
    }

   .article-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

   .article-content {
      padding: 15px;
    }

   .category {
      background: #38bdf8;
      color: #000;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

   .meta {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 10px;
    }

    footer {
      background: #020617;
      padding: 30px;
      margin-top: 40px;
      text-align: center;
      border-top: 2px solid #38bdf8;
    }

   .footer-section {
      margin-bottom: 20px;
    }

   .social-container a {
      margin: 0 10px;
      font-size: 20px;
      color: #38bdf8;
      transition: 0.3s;
    }

   .social-container a:hover {
      color: #fff;
    }

   .copyright {
      margin-top: 20px;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<header>
  <h1><i class="fas fa-globe-africa"></i> SpiderWeb News SA</h1>
  <h4>South Africa's #1 News Source</h4>
  <p>Breaking news, soccer updates, politics & celebrity gossip</p>
</header>

<div class="search-box">
  <input id="searchInput" placeholder="Search news..." />
  <select id="filter">
    <option value="publishedAt">Latest</option>
    <option value="relevance">Trending</option>
  </select>
  <button onclick="searchNews()">Search</button>
</div>

<nav>
  <a class="active" onclick="switchTab(event,'home')">Home</a>
  <a onclick="switchTab(event,'sports')">Sports</a>
</nav>

<div class="container">
  <div id="homeTab"></div>
  <div id="sportsTab" style="display:none;"></div>
  <div id="politicsTab" style="display:none;"></div>
</div>

<footer>
  <div class="footer-section">
    <h4>Quick Links</h4>
    <p>Contact Us<br>Advertise<br>Privacy Policy<br>Terms of Service</p>
  </div>

  <div class="footer-section">
    <h4>Follow Us</h4>
    <div class="social-container">
      <a href="https://www.instagram.com/spiderwebnewss?igsh=MXNuYXI2aDcwbGx3eg==" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://www.youtube.com/@SpiderWebNews" target="_blank">
        <i class="fab fa-youtube"></i>
      </a>
      <a href="https://x.com/spiderwebnews1" target="_blank">
        <i class="fab fa-x-twitter"></i>
      </a>
    </div>
  </div>

  <div class="copyright">
    <p>&copy; 2026 SpiderWeb News SA. Made with ❤️ for Mzansi</p>
  </div>
</footer>

<script>
const BASE = "https://spiderweb-backend.onrender.com/api";

async function fetchAPI(url){
  try{
    const res = await fetch(url);
    const data = await res.json();
    return data.articles || [];
  }catch(err){
    console.error('API error:', err);
    return [];
  }
}

function buildURL(endpoint, params={}){
  return `${BASE}/${endpoint}?` + new URLSearchParams(params);
}

async function fetchTopNews(){
  return fetchAPI(buildURL("news")); 
}

async function fetchSportsNews(){
  return fetchAPI(buildURL("sports")); 
}


async function fetchSearch(q){
  const sort = document.getElementById("filter").value;
  return fetchAPI(buildURL("search", {q, sort})); // calls /api/search?q=...&sort=...
}

function render(data,id){
  const el = document.getElementById(id);
  if(!data.length){
    el.innerHTML = "<p>No news available</p>";
    return;
  }

  el.innerHTML = `<div class="article-grid">${data.map(a=>`
    <div class="article-card" onclick="window.open('${a.url}','_blank')">
      <img src="${a.image || 'https://picsum.photos/400/300'}">
      <div class="article-content">
        <span class="category">${a.source?.name || 'News'}</span>
        <h3>${a.title}</h3>
        <p>${a.description || ''}</p>
        <div class="meta">${a.publishedAt?.split("T")[0] || ''}</div>
      </div>
    </div>
  `).join("")}</div>`;
}

function switchTab(e,t){
  ["home","sports"].forEach(x=>{
    document.getElementById(x+"Tab").style.display = (x===t)?"block":"none";
  });

  document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
  e.target.classList.add("active");

  if(t==="sports") loadSports();
}

async function loadHome(){ render(await fetchTopNews(),"homeTab"); }
async function loadSports(){ render(await fetchSportsNews(),"sportsTab"); }

async function searchNews(){
  const term = document.getElementById("searchInput").value;
  if(!term) return;
  document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
  document.querySelector("nav a").classList.add("active"); 
  ["sportsTab"].forEach(id => document.getElementById(id).style.display = "none");
  document.getElementById("homeTab").style.display = "block";
  render(await fetchSearch(term),"homeTab");
}

loadHome();
</script>

</body>
</html>
